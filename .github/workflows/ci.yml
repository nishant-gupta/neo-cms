name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "cursor/**"

permissions:
  contents: read

jobs:
  node-backend-template:
    name: node-backend-template
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/node-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: templates/node-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  terraform-epic1:
    name: terraform-epic1
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform/epic1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"

      - name: Terraform format check
        run: terraform fmt -check

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate
